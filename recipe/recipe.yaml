# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  name: pixi-build-rust
  crate_name: pixi_build_rust
  version: "0.5.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/prefix-dev/pixi/archive/refs/tags/${{ name }}-v${{ 
    version }}.tar.gz
  sha256: 19f2e7c1abfce1795299d781d26641265fc6bc868ad752efbb4ebea4b65f70f2

build:
  number: 1
  script:
    env:
      # Use cmake to build aws-lc-sys, because conda's CFLAGS inject -O2 which
      # overrides the -O0 required by jitterentropy-base.c, causing a build failure.
      AWS_LC_SYS_CMAKE_BUILDER: "1"
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
    - if: osx and x86_64
      then:
          # use the default linker for osx-64 as we are hitting a bug with the conda-forge linker
          # https://github.com/rust-lang/rust/issues/140686
      - unset CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER

    - if: unix
      then:
      - export OPENSSL_DIR="$PREFIX"
    - if: linux
      then:
        # aws-lc-sys' cmake builder defaults to the "Unix Makefiles" generator, but the
        # Linux build environment has no make; use the ninja generator instead.
      - export CMAKE_GENERATOR=Ninja
    - if: win
      then:
      - set CARGO_HOME=C:\.cargo
      - md %CARGO_HOME%
    - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} 
      --path crates/${{ crate_name }} --no-default-features --features 
      native-tls
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  files:
  - bin/${{ name }}
  - bin/${{ name }}.exe

requirements:
  build:
  - ${{ compiler("rust") }}
  - ${{ stdlib("c") }}
  # for building aws-lc-sys
  - cmake
  - ninja
  - cargo-bundle-licenses
  - cargo-auditable
  host:
  - if: target_platform != 'win-arm64'
    then: pkg-config
  - if: unix
    then: openssl
  run:
  - pixi-build-api-version >=5,<6

tests:
- script:
  - if: build_platform == target_platform
    then: ${{ name }} --help
- package_contents:
    bin:
    - ${{ name }}

about:
  homepage: https://github.com/prefix-dev/pixi
  summary: A pixi build backend to build Rust packages.
  description: |
    This package provides a build backend for pixi that allows building Rust packages.
  license: BSD-3-Clause
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  documentation: https://pixi.prefix.dev/latest/build/backends/pixi-build-rust/
  repository: https://github.com/prefix-dev/pixi

extra:
  recipe-maintainers:
  - Hofer-Julian
  - baszalmstra
  - ruben-arts
